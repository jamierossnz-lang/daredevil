services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-./data}/redis:/data

  # ── qBittorrent ────────────────────────────────────────────────────────────
  # Web UI: http://<host>:${QBT_WEBUI_PORT:-8081}   (default 8081 — Unraid uses 8080)
  # First run: check logs for the temporary password → docker compose logs qbittorrent
  # Skip this service if you already have qBittorrent installed on Unraid via Community Apps.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=8080
    ports:
      - "${QBT_WEBUI_PORT:-8081}:8080"  # Changed default to 8081 — Unraid WebUI is on 8080
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - ${DATA_DIR:-./data}/qbt:/config
      - ${DOWNLOADS_DIR:-./downloads}:/downloads

  # ── Jackett ────────────────────────────────────────────────────────────────
  # Web UI: http://<host>:${JACKETT_PORT:-9118}
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - AUTO_UPDATE=true
    ports:
      - "${JACKETT_PORT:-9118}:9117"
    volumes:
      - ${DATA_DIR:-./data}/jackett:/config
      - ${DOWNLOADS_DIR:-./downloads}:/downloads

  # ── Plex Media Server ──────────────────────────────────────────────────────
  # Web UI: http://<host>:32400/web
  # Skip this service if Plex is already installed on Unraid via Community Apps —
  # just point PLEX_URL in .env at your existing Plex container (e.g. http://plex:32400).
  plex:
    image: lscr.io/linuxserver/plex:latest
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM:-}
    ports:
      - "32400:32400"
    volumes:
      - ${DATA_DIR:-./data}/plex:/config
      - ${MOVIES_DIR:-./movies}:/data/movies
      - ${TV_DIR:-./tv}:/data/tv

  # ── Daredevil web server ───────────────────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QBITTORRENT_HOST=qbittorrent
      - QBITTORRENT_PORT=8080
      - DB_PATH=/app/data/db.sqlite3
    depends_on:
      - redis
      - qbittorrent
    volumes:
      - ${DATA_DIR:-./data}/app:/app/data
      - ${DOWNLOADS_DIR:-./downloads}:/media/downloads
      - ${MOVIES_DIR:-./movies}:/media/movies
      - ${TV_DIR:-./tv}:/media/tv

  # ── Celery worker ──────────────────────────────────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency 2
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QBITTORRENT_HOST=qbittorrent
      - QBITTORRENT_PORT=8080
      - DB_PATH=/app/data/db.sqlite3
    depends_on:
      - redis
      - qbittorrent
    volumes:
      - ${DATA_DIR:-./data}/app:/app/data
      - ${DOWNLOADS_DIR:-./downloads}:/media/downloads
      - ${MOVIES_DIR:-./movies}:/media/movies
      - ${TV_DIR:-./tv}:/media/tv

  # ── Celery beat scheduler ──────────────────────────────────────────────────
  beat:
    build: .
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DB_PATH=/app/data/db.sqlite3
    depends_on:
      - redis
    volumes:
      - ${DATA_DIR:-./data}/app:/app/data
