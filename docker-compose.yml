services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # ── qBittorrent ────────────────────────────────────────────────────────────
  # Web UI: http://localhost:8080
  # First run: check logs for the temporary password →  docker compose logs qbittorrent
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=8080
    ports:
      - "8080:8080"       # Web UI
      - "6881:6881"       # Torrent port TCP
      - "6881:6881/udp"   # Torrent port UDP
    volumes:
      - qbt_config:/config
      - downloads:/downloads  # In-progress downloads

  # ── Plex Media Server ──────────────────────────────────────────────────────
  # Web UI: http://localhost:32400/web
  # First run: get a claim token from https://www.plex.tv/claim/ and set PLEX_CLAIM in .env
  # After first successful start the token is no longer needed.
  plex:
    image: lscr.io/linuxserver/plex:latest
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM:-}
    ports:
      - "32400:32400"     # Web UI + API
    volumes:
      - plex_config:/config
      - movies:/data/movies
      - tv:/data/tv

  # ── Daredevil web server ───────────────────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override .env values to use Docker service names for internal networking
      - REDIS_URL=redis://redis:6379/0
      - QBITTORRENT_HOST=qbittorrent
      - QBITTORRENT_PORT=8080
    depends_on:
      - redis
      - qbittorrent
    volumes:
      - db_data:/app/db.sqlite3
      - downloads:/media/downloads  # Must match qBittorrent's /downloads
      - movies:/media/movies        # Completed movies — also Plex source
      - tv:/media/tv                # Completed TV    — also Plex source

  # ── Celery worker ──────────────────────────────────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency 2
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QBITTORRENT_HOST=qbittorrent
      - QBITTORRENT_PORT=8080
    depends_on:
      - redis
      - qbittorrent
    volumes:
      - db_data:/app/db.sqlite3
      - downloads:/media/downloads
      - movies:/media/movies
      - tv:/media/tv

  # ── Celery beat scheduler ──────────────────────────────────────────────────
  beat:
    build: .
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - db_data:/app/db.sqlite3

volumes:
  redis_data:
  db_data:
  qbt_config:       # qBittorrent settings and state
  plex_config:      # Plex metadata and database
  downloads:        # Shared: qBittorrent writes, Daredevil reads/moves from here
  movies:           # Shared: Daredevil writes, Plex reads
  tv:               # Shared: Daredevil writes, Plex reads
